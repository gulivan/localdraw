name: Desktop Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag (for example, v0.5.1-desktop)
        required: true

permissions:
  contents: write

jobs:
  macos:
    name: macOS (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
          - runner: macos-15-intel
            arch: x64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            desktop/package-lock.json
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci --prefix desktop
      - name: Build desktop app
        shell: bash
        run: |
          for attempt in 1 2; do
            if npm run build --prefix desktop; then
              exit 0
            fi
            if [ "$attempt" -eq 2 ]; then
              exit 1
            fi
            echo "Native macOS packaging failed; retrying once after hdiutil settles."
            sleep 10
          done
      - name: Verify desktop runtime and bundle
        working-directory: desktop
        run: |
          npm test
          npm run typecheck
          node scripts/run-electrobun-bun.mjs scripts/bun-sqlite-smoke.ts
          npm run check:bundle
      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          VERSION="${VERSION%-desktop}"
          SOURCE=$(find desktop/artifacts -type f -name '*.dmg' | head -1)
          test -n "$SOURCE"
          ASSET="localdraw-${VERSION}-darwin-${{ matrix.arch }}.dmg"
          cp "$SOURCE" "$ASSET"
          shasum -a 256 "$ASSET" > "${ASSET}.sha256"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
      - name: Report and enforce release size
        shell: bash
        run: |
          ASSET="${{ steps.asset.outputs.asset }}"
          BYTES=$(stat -f%z "$ASSET")
          LIMIT=$((40 * 1024 * 1024))
          {
            echo "### macOS ${{ matrix.arch }} desktop size"
            echo
            echo "- Download: $(du -h "$ASSET" | cut -f1) ($BYTES bytes)"
            echo "- Backend: $(du -sh desktop/build/stable-macos-*/ExcaliDash.app/Contents/Resources/app/backend | cut -f1)"
            echo "- Frontend: $(du -sh desktop/build/stable-macos-*/ExcaliDash.app/Contents/Resources/app/frontend | cut -f1)"
            echo "- Limit: 40 MiB"
          } >> "$GITHUB_STEP_SUMMARY"
          test "$BYTES" -le "$LIMIT"
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name || inputs.tag }}" \
            "${{ steps.asset.outputs.asset }}" \
            "${{ steps.asset.outputs.asset }}.sha256" --clobber

  linux:
    name: Linux (x64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            desktop/package-lock.json
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-1 \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            xvfb \
            zstd
      - name: Install dependencies
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci --prefix desktop
      - name: Build desktop app
        run: npm run build --prefix desktop
      - name: Verify desktop runtime and bundle
        working-directory: desktop
        run: |
          npm test
          npm run typecheck
          node scripts/run-electrobun-bun.mjs scripts/bun-sqlite-smoke.ts
          npm run check:bundle
      - name: Extract portable app bundle
        shell: bash
        run: |
          ARCHIVE=$(find desktop/artifacts -maxdepth 1 -type f -name '*-ExcaliDash.tar.zst' | head -1)
          test -n "$ARCHIVE"
          mkdir -p desktop/portable-linux
          zstd --decompress --stdout "$ARCHIVE" | tar -xf - -C desktop/portable-linux
          APP_BIN=desktop/portable-linux/ExcaliDash/bin
          test -x "$APP_BIN/launcher"
          mv "$APP_BIN/launcher" "$APP_BIN/launcher-bin"
          cp desktop/scripts/linux-launcher.sh "$APP_BIN/launcher"
          chmod +x "$APP_BIN/launcher"
          strip --strip-unneeded \
            "$APP_BIN/bun" \
            "$APP_BIN/launcher-bin" \
            "$APP_BIN/libNativeWrapper.so" \
            "$APP_BIN/libasar.so" \
            "$APP_BIN/zig-zstd"
          LD_LIBRARY_PATH="$APP_BIN" ldd "$APP_BIN/libNativeWrapper.so" | tee localdraw-linux-ldd.log
          ! grep -q 'not found' localdraw-linux-ldd.log
      - name: Smoke test packaged app
        shell: bash
        run: |
          APP_DIR=desktop/portable-linux/ExcaliDash
          xvfb-run -a "$APP_DIR/bin/launcher" >localdraw-linux.log 2>&1 &
          APP_PID=$!
          trap 'kill "$APP_PID" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:32145/auth/status >/dev/null; then
              exit 0
            fi
            if ! kill -0 "$APP_PID" 2>/dev/null; then
              cat localdraw-linux.log
              exit 1
            fi
            sleep 1
          done
          cat localdraw-linux.log
          exit 1
      - name: Prepare release asset
        id: asset
        shell: bash
        run: |
          TAG="${{ github.event.release.tag_name || inputs.tag }}"
          VERSION="${TAG#v}"
          VERSION="${VERSION%-desktop}"
          BUNDLE_DIR=desktop/portable-linux/ExcaliDash
          test -d "$BUNDLE_DIR"
          ASSET="localdraw-${VERSION}-linux-x64.tar.gz"
          tar -C "$BUNDLE_DIR" -czf "$ASSET" .
          sha256sum "$ASSET" > "${ASSET}.sha256"
          echo "asset=$ASSET" >> "$GITHUB_OUTPUT"
      - name: Report and enforce release size
        shell: bash
        run: |
          ASSET="${{ steps.asset.outputs.asset }}"
          BYTES=$(stat -c%s "$ASSET")
          LIMIT=$((70 * 1024 * 1024))
          {
            echo "### Linux x64 desktop size"
            echo
            echo "- Download: $(du -h "$ASSET" | cut -f1) ($BYTES bytes)"
            echo "- Runtime: $(du -sh desktop/portable-linux/ExcaliDash/bin | cut -f1)"
            echo "- Backend: $(du -sh desktop/portable-linux/ExcaliDash/Resources/app/backend | cut -f1)"
            echo "- Frontend: $(du -sh desktop/portable-linux/ExcaliDash/Resources/app/frontend | cut -f1)"
            echo "- Limit: 70 MiB"
          } >> "$GITHUB_STEP_SUMMARY"
          test "$BYTES" -le "$LIMIT"
      - name: Upload release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name || inputs.tag }}" \
            "${{ steps.asset.outputs.asset }}" \
            "${{ steps.asset.outputs.asset }}.sha256" --clobber

  windows:
    name: Windows (x64)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name || inputs.tag }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            desktop/package-lock.json
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install dependencies
        shell: bash
        run: |
          npm ci --prefix backend
          npm ci --prefix frontend
          npm ci --prefix desktop
      - name: Build desktop app
        run: npm run build --prefix desktop
      - name: Verify desktop runtime and bundle
        shell: bash
        working-directory: desktop
        run: |
          npm test
          npm run typecheck
          node scripts/run-electrobun-bun.mjs scripts/bun-sqlite-smoke.ts
          npm run check:bundle
      - name: Extract portable app bundle
        shell: pwsh
        run: |
          $archive = Get-ChildItem desktop/artifacts -File -Filter '*-ExcaliDash.tar.zst' | Select-Object -First 1
          if (-not $archive) { throw 'No Windows portable archive found' }
          $portableDir = 'desktop/portable-win'
          New-Item -ItemType Directory -Path $portableDir -Force | Out-Null
          tar -xf $archive.FullName -C $portableDir
          if (-not (Test-Path "$portableDir/ExcaliDash/bin/launcher.exe")) { throw 'Windows launcher not found' }
      - name: Prepare release asset
        id: asset
        shell: pwsh
        run: |
          $tag = "${{ github.event.release.tag_name || inputs.tag }}"
          $version = $tag -replace '^v', '' -replace '-desktop$', ''
          $bundleDir = 'desktop/portable-win/ExcaliDash'
          $portableExe = "localdraw-$version-win-x64-portable.exe"
          $portable = "localdraw-$version-win-x64-portable.zip"
          Compress-Archive -Path "$bundleDir/*" -DestinationPath $portable -Force
          desktop/scripts/create-windows-portable-exe.ps1 `
            -Version $version `
            -BundlePath $bundleDir `
            -OutputPath $portableExe
          foreach ($asset in @($portableExe, $portable)) {
            $hash = (Get-FileHash -Algorithm SHA256 $asset).Hash.ToLowerInvariant()
            "$hash  $asset" | Set-Content -NoNewline "$asset.sha256"
          }
          "asset=$portableExe" >> $env:GITHUB_OUTPUT
          "portable=$portable" >> $env:GITHUB_OUTPUT
      - name: Report and enforce release size
        shell: pwsh
        run: |
          $asset = "${{ steps.asset.outputs.asset }}"
          $portable = "${{ steps.asset.outputs.portable }}"
          $bytes = (Get-Item $asset).Length
          $portableBytes = (Get-Item $portable).Length
          $limit = 80 * 1024 * 1024
          $bundle = 'desktop/portable-win/ExcaliDash'
          $directorySize = {
            param($path)
            $total = (Get-ChildItem $path -File -Recurse | Measure-Object Length -Sum).Sum
            '{0:N1} MiB' -f ($total / 1MB)
          }
          @(
            '### Windows x64 desktop size'
            ''
            "- Portable executable: $('{0:N1}' -f ($bytes / 1MB)) MiB ($bytes bytes)"
            "- Portable npx payload: $('{0:N1}' -f ($portableBytes / 1MB)) MiB ($portableBytes bytes)"
            "- Runtime: $(& $directorySize "$bundle/bin")"
            "- Backend: $(& $directorySize "$bundle/Resources/app/backend")"
            "- Frontend: $(& $directorySize "$bundle/Resources/app/frontend")"
            '- Limit: 80 MiB'
          ) | Add-Content $env:GITHUB_STEP_SUMMARY
          if ($bytes -gt $limit) {
            throw "Windows desktop artifact exceeds the 80 MiB limit"
          }
          if ($portableBytes -gt $limit) {
            throw "Windows portable artifact exceeds the 80 MiB limit"
          }
      - name: Upload release asset
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ github.event.release.tag_name || inputs.tag }}" \
            "${{ steps.asset.outputs.asset }}" \
            "${{ steps.asset.outputs.asset }}.sha256" \
            "${{ steps.asset.outputs.portable }}" \
            "${{ steps.asset.outputs.portable }}.sha256" --clobber
